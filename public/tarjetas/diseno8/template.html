<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tennis Card - Aerial Grass</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #0a1a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card {
      width: 1080px; height: 1920px;
      background: linear-gradient(160deg, #0a1a0a 0%, #0f2a0f 40%, #1a3d1a 100%);
      font-family: 'Inter', sans-serif;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    /* Líneas de pista */
    .court-lines {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      opacity: 0.06;
    }
    .court-lines::before {
      content: '';
      position: absolute;
      top: 15%; left: 10%; right: 10%; bottom: 15%;
      border: 3px solid #ffffff;
    }
    .court-lines::after {
      content: '';
      position: absolute;
      top: 15%; left: 50%; bottom: 15%;
      width: 3px;
      background: #ffffff;
      transform: translateX(-50%);
    }
    .card::before {
      content: '';
      position: absolute;
      top: -200px; right: -200px;
      width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(34,197,94,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: -200px; left: -200px;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(21,128,61,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .top-bar { height: 5px; background: linear-gradient(90deg, #15803d, #22c55e, #86efac, #22c55e, #15803d); }
    .header { padding: 70px 80px 0; position: relative; z-index: 1; }
    .brand {
      font-family: 'Space Mono', monospace;
      font-size: 26px; font-weight: 700;
      color: #22c55e; letter-spacing: 4px;
      text-transform: uppercase; margin-bottom: 50px; display: block;
    }
    .tournament {
      font-size: 2.2rem; font-weight: 800;
      color: #ffffff; text-transform: uppercase;
      letter-spacing: 3px; margin-bottom: 20px; min-height: 44px;
    }
    .datetime {
      font-family: 'Space Mono', monospace;
      font-size: 1.6rem; color: rgba(134,239,172,0.8); letter-spacing: 2px;
    }
    .divider {
      margin: 60px 80px; height: 2px;
      background: linear-gradient(90deg, #22c55e66, #86efac33, transparent);
      position: relative; z-index: 1;
    }
    .match-section { padding: 0 80px; position: relative; z-index: 1; }
    .match-label {
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem; color: rgba(255,255,255,0.2);
      letter-spacing: 4px; text-transform: uppercase;
      margin-bottom: 36px; display: block;
    }
    .player {
      font-size: 5.5rem; font-weight: 900;
      color: #ffffff; text-transform: uppercase;
      letter-spacing: -3px; line-height: 1.0; min-height: 90px;
    }
    .vs-row { display: flex; align-items: center; gap: 28px; margin: 40px 0; }
    .vs-text {
      font-family: 'Space Mono', monospace;
      font-size: 1.8rem; font-weight: 700;
      color: #22c55e; letter-spacing: 4px;
    }
    .vs-line { flex: 1; height: 2px; background: rgba(34,197,94,0.2); }
    .prediction-box {
      margin: 60px 80px;
      border: 2px solid rgba(34,197,94,0.5);
      border-radius: 20px; padding: 50px 60px;
      background: rgba(34,197,94,0.07);
      position: relative; z-index: 1;
    }
    .prediction-label {
      font-family: 'Space Mono', monospace;
      font-size: 1.4rem; color: #22c55e;
      letter-spacing: 4px; text-transform: uppercase; margin-bottom: 24px;
    }
    .prediction-winner {
      font-size: 4rem; font-weight: 900;
      color: #ffffff; text-transform: uppercase;
      letter-spacing: -1px; min-height: 64px;
    }
    .stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 24px; margin: 0 80px; position: relative; z-index: 1;
    }
    .stat-box {
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 16px; padding: 40px 30px;
      text-align: center; background: rgba(34,197,94,0.05);
    }
    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 1.3rem; color: rgba(134,239,172,0.6);
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 18px;
    }
    .stat-value { font-size: 4.5rem; font-weight: 900; color: #86efac; }
    .footer {
      padding: 50px 80px 70px;
      display: flex; justify-content: space-between; align-items: flex-end;
      position: relative; z-index: 1;
    }
    .footer-brand {
      font-family: 'Space Mono', monospace;
      font-size: 1.3rem; color: rgba(255,255,255,0.12);
      letter-spacing: 3px; text-transform: uppercase;
    }
    .footer-tag {
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem; color: rgba(34,197,94,0.3); letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="court-lines"></div>
    <div class="top-bar"></div>
    <div class="header">
      <span class="brand">🎾 Tennis Suite</span>
      <div class="tournament">{{TORNEO}}</div>
      <div class="datetime">{{FECHA}} · {{HORA}}</div>
    </div>
    <div class="divider"></div>
    <div class="match-section">
      <span class="match-label">Partido</span>
      <div class="player">{{JUGADOR1}}</div>
      <div class="vs-row">
        <span class="vs-text">VS</span>
        <div class="vs-line"></div>
      </div>
      <div class="player">{{JUGADOR2}}</div>
    </div>
    <div class="prediction-box">
      <div class="prediction-label">Predicción</div>
      <div class="prediction-winner">{{GANADOR}}</div>
    </div>
    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Probabilidad</div>
        <div class="stat-value">{{PROBABILIDAD}}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Cuota</div>
        <div class="stat-value">{{CUOTA}}</div>
      </div>
    </div>
    <div class="footer">
      <span class="footer-brand">Tennis Suite</span>
      <span class="footer-tag">#TennisPredictions</span>
    </div>
  </div>
</body>
</html>
